name: Medicine Price Scraper

on:
  schedule:
    - cron: '0 2 * * *'    # 7:30 AM IST daily
    - cron: '0 14 * * *'   # 7:30 PM IST daily
  workflow_dispatch:         # Manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install dependencies
        working-directory: apps/backend
        run: npm ci

      - name: Run scraper
        working-directory: apps/backend
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          NODE_ENV:    production
        run: npx ts-node -r tsconfig-paths/register src/scrapers/run-scraper.ts

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs
          path: apps/backend/*.log
          retention-days: 3

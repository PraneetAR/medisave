name: Medicine Price Scraper

on:
  schedule:
    - cron: '0 2 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install ALL dependencies (including dev)
        working-directory: apps/backend
        run: npm ci

      - name: Run scraper
        working-directory: apps/backend
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          NODE_ENV: production
          JWT_SECRET: placeholder
          JWT_REFRESH_SECRET: placeholder
          FRONTEND_URL: https://medisave-ashy.vercel.app
        run: npx ts-node -r tsconfig-paths/register src/scrapers/run-scraper.ts

